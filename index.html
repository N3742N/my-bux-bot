<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .balance { font-size: 24px; color: #28a745; font-weight: bold; margin-bottom: 20px; }
        button { background: #0088cc; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Твой Баланс</h2>
        <div id="balance" class="balance">0.00 ₴</div>
        <hr>
        <p>Подпишись на канал и нажми кнопку:</p>
        <button onclick="claim()">Проверить и получить 0.50 ₴</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user_id = tg.initDataUnsafe.user.id;
        const API_URL = "https://unpeaked-jumpily-hien.ngrok-free.dev";// Сюда адрес бэкенда

        async function updateBalance() {
            const r = await fetch(`${API_URL}/get_balance?user_id=${user_id}`);
            const data = await r.json();
            document.getElementById('balance').innerText = data.balance.toFixed(2) + " ₴";
        }

        async function claim() {
            await fetch(`${API_URL}/complete_task`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: user_id})
            });
            updateBalance();
            tg.showAlert("Деньги начислены!");
        }

        updateBalance();
    </script>
</body>
</html>
