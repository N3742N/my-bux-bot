<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Liquid Bux</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --ios-bg: #ffffff;
            --ios-glass: rgba(255, 255, 255, 0.7);
            --ios-text: #000000;
            --ios-accent: #007AFF; /* Классический Blue Apple */
            --ios-success: #34C759;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* Темная тема iOS */
        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;
                --ios-glass: rgba(28, 28, 30, 0.8);
                --ios-text: #ffffff;
                --ios-accent: #0A84FF;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            background-color: var(--ios-bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(0, 122, 255, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 100% 100%, rgba(52, 199, 89, 0.1) 0%, transparent 40%);
            color: var(--ios-text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Анимация "Ликвид" (плавное всплытие) */
        @keyframes liquidShow {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .liquid-card {
            background: var(--ios-glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            padding: 20px;
            box-shadow: var(--shadow);
            animation: liquidShow 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Статус онлайн в стиле Dynamic Island */
        .online-island {
            background: #000;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            width: fit-content;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }
        .dot { width: 6px; height: 6px; background: var(--ios-success); border-radius: 50%; box-shadow: 0 0 8px var(--ios-success); }

        /* Профиль */
        .profile-header { display: flex; justify-content: space-between; align-items: center; }
        .avatar { 
            width: 52px; height: 52px; 
            border-radius: 50%; 
            background: linear-gradient(180deg, #5AC8FA 0%, #007AFF 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: white;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }
        .balance-title { font-size: 13px; opacity: 0.6; margin-bottom: 2px; }
        .balance-val { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        /* Живые выплаты (Горизонтальный Liquid-скролл) */
        .payouts-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 0;
            scroll-snap-type: x mandatory;
        }
        .payouts-container::-webkit-scrollbar { display: none; }
        
        .payout-pill {
            min-width: 140px;
            background: var(--ios-glass);
            padding: 12px;
            border-radius: 22px;
            text-align: center;
            scroll-snap-align: start;
        }

        /* Кнопки заданий */
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-card {
            background: var(--ios-glass);
            padding: 18px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .task-card:active { transform: scale(0.95); }

        .btn-ios {
            background: var(--ios-accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }

        .section-name { font-size: 13px; font-weight: 600; color: #8E8E93; text-transform: uppercase; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="online-island">
        <div class="dot"></div>
        <span id="online-count">9,321 ONLINE</span>
    </div>

    <div class="liquid-card profile-header" style="animation-delay: 0.1s;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="avatar" id="avatar">?</div>
            <div>
                <div style="font-size: 15px; opacity: 0.5;">Welcome back,</div>
                <div id="username" style="font-size: 18px; font-weight: 700;">User</div>
            </div>
        </div>
        <div style="text-align: right;">
            <div class="balance-title">Balance</div>
            <div class="balance-val"><span id="balance">0.00</span><span style="font-size: 16px; margin-left: 4px;">₴</span></div>
        </div>
    </div>

    <div class="section-name">Recent Activity</div>
    <div class="payouts-container" id="payouts">
        </div>

    <div class="section-name">Available Tasks</div>
    <div class="task-list">
        <div class="liquid-card task-card" style="animation-delay: 0.2s;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; font-size: 17px;">Subscribe to Channel</span>
                <span style="color: var(--ios-success); font-weight: 700;">+0.50 ₴</span>
            </div>
            <button class="btn-ios" onclick="processTask(0.50)">Claim Reward</button>
        </div>

        <div class="liquid-card task-card" style="animation-delay: 0.3s;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600; font-size: 17px;">Join Secret Group</span>
                <span style="color: var(--ios-success); font-weight: 700;">+0.75 ₴</span>
            </div>
            <button class="btn-ios" onclick="processTask(0.75)">Apply Now</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const API_URL = "https://unpeaked-jumpily-hien.ngrok-free.dev";

        // Динамический онлайн
        setInterval(() => {
            const count = (9000 + Math.floor(Math.random() * 800)).toLocaleString();
            document.getElementById('online-count').innerText = `${count} ONLINE`;
        }, 4000);

        // Генерация выплат (Liquid Pills)
        const userPool = ["Andrey", "Dmitry", "Sasha", "Oleg", "Ivan"];
        function generatePayouts() {
            const container = document.getElementById('payouts');
            container.innerHTML = '';
            for(let i=0; i<5; i++) {
                const name = userPool[Math.floor(Math.random()*userPool.length)];
                const amt = (Math.random()*2000 + 500).toFixed(0);
                container.innerHTML += `
                    <div class="payout-pill">
                        <div style="font-size: 11px; opacity: 0.5;">Just now</div>
                        <div style="font-weight: 700; color: var(--ios-success); margin: 2px 0;">${amt} ₴</div>
                        <div style="font-size: 12px; font-weight: 500;">${name}</div>
                    </div>
                `;
            }
        }

        // Подгрузка данных Telegram
        if (tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('username').innerText = user.first_name;
            document.getElementById('avatar').innerText = user.first_name.charAt(0);
        }

        async function processTask(amt) {
            tg.HapticFeedback.impactOccurred('medium');
            const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 12345;
            
            try {
                const res = await fetch(`${API_URL}/complete_task`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId})
                });
                const data = await res.json();
                if (data.status === 'success') {
                    document.getElementById('balance').innerText = data.new_balance.toFixed(2);
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } catch (e) {
                tg.showAlert("Server Connection Lost");
            }
        }

        generatePayouts();
        setInterval(generatePayouts, 20000);
    </script>
</body>
</html>
