<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Liquid Bux</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-glass: rgba(28, 28, 30, 0.7);
            --ios-text: #ffffff;
            --ios-accent: #0A84FF;
            --ios-success: #32D74B;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--ios-bg);
            background-image: radial-gradient(circle at 50% -20%, #1c2c4c 0%, #000000 100%);
            color: var(--ios-text);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-x: hidden;
            user-select: none;
        }

        /* Анимации */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateX(0); filter: blur(0); }
        }

        /* Header & Profile */
        .profile-card {
            background: var(--ios-glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .profile-card:active { transform: scale(0.97); }

        .user-info { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        
        .avatar-img { 
            width: 44px; height: 44px; 
            border-radius: 50%; 
            object-fit: cover;
            border: 2px solid var(--ios-accent);
        }

        .name-wrapper { overflow: hidden; }
        .username { 
            font-weight: 700; font-size: 17px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; /* Сокращение длинного ника */
            max-width: 140px; 
        }

        .balance-box { text-align: right; min-width: 80px; }
        .balance-val { font-size: 22px; font-weight: 800; color: var(--ios-text); }

        /* Recent Activity (Живая лента) */
        .activity-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .activity-scroll::-webkit-scrollbar { display: none; }

        .activity-item {
            min-width: 130px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        /* Tasks */
        .task-card {
            background: var(--ios-glass);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .btn-action {
            background: var(--ios-accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
        }
        .btn-action:active { transform: scale(0.96); opacity: 0.8; }

        /* Модальное окно (Вывод денег) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: flex-end;
            z-index: 1000;
        }
        .modal-content {
            background: #1c1c1e;
            width: 100%;
            border-radius: 30px 30px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .modal-active .modal-content { transform: translateY(0); }
        
        .payout-option {
            background: rgba(255,255,255,0.05);
            padding: 16px; border-radius: 18px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-label { font-size: 13px; font-weight: 600; color: #8E8E93; text-transform: uppercase; margin-left: 8px; }
    </style>
</head>
<body>

    <div class="profile-card" onclick="openWithdraw()">
        <div class="user-info">
            <img src="" id="user-avatar" class="avatar-img" alt="👤">
            <div class="name-wrapper">
                <div style="font-size: 12px; opacity: 0.5;">Привет,</div>
                <div class="username" id="user-name">Загрузка...</div>
            </div>
        </div>
        <div class="balance-box">
            <div style="font-size: 11px; opacity: 0.5; font-weight: 600;">БАЛАНС</div>
            <div class="balance-val"><span id="balance">0.00</span> ₴</div>
        </div>
    </div>

    <div class="section-label">Последние выплаты</div>
    <div class="activity-scroll" id="activity-feed">
        </div>

    <div class="section-label">Доступные задания</div>
    <div class="task-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 600; font-size: 17px;">Подписка на канал</span>
            <span style="color: var(--ios-success); font-weight: 700;">+0.50 ₴</span>
        </div>
        <button class="btn-action" onclick="doTask(0.50)">Проверить и получить</button>
    </div>

    <div class="modal-overlay" id="payout-modal" onclick="closeWithdraw()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 22px;">Вывод денег</h2>
                <div onclick="closeWithdraw()" style="background: #3a3a3c; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; opacity: 0.7;">✕</div>
            </div>
            
            <div class="payout-option">
                <span style="font-size: 24px;">💳</span>
                <div style="font-weight: 600;">На карту банка</div>
            </div>
            <div class="payout-option">
                <span style="font-size: 24px;">🔄</span>
                <div style="font-weight: 600;">Через СБП</div>
            </div>
            
            <div style="background: rgba(10, 132, 255, 0.1); padding: 15px; border-radius: 15px; font-size: 14px; color: var(--ios-accent); text-align: center;">
                Выплата доступна 24/7 • Без оператора
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const API_URL = "https://unpeaked-jumpily-hien.ngrok-free.dev";

        // 1. Сокращение ника и подтяжка аватара
        if (tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('user-name').innerText = user.first_name;
            
            // Если есть фото профиля — ставим, если нет — стандартная заглушка
            if (user.photo_url) {
                document.getElementById('user-avatar').src = user.photo_url;
            } else {
                document.getElementById('user-avatar').src = "https://ui-avatars.com/api/?name=" + user.first_name + "&background=0D8ABC&color=fff";
            }
        }

        // 2. Плавная "Recent Activity"
        const users = ["Андрей", "Дмитрий", "Мария", "Алекс", "Ольга", "Иван"];
        function addActivity() {
            const feed = document.getElementById('activity-feed');
            const name = users[Math.floor(Math.random() * users.length)];
            const sum = (Math.random() * 1500 + 300).toFixed(0);
            
            const item = document.createElement('div');
            item.className = 'activity-item';
            item.innerHTML = `
                <div style="font-size: 10px; opacity: 0.5;">Только что</div>
                <div style="color: var(--ios-success); font-weight: 700; margin: 2px 0;">${sum} ₴</div>
                <div style="font-size: 13px; font-weight: 500;">${name}</div>
            `;
            
            feed.prepend(item);
            if(feed.children.length > 5) feed.lastChild.remove();
        }
        setInterval(addActivity, 4000);
        addActivity(); addActivity();

        // 3. Функции вывода
        function openWithdraw() {
            const modal = document.getElementById('payout-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('modal-active'), 10);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeWithdraw() {
            const modal = document.getElementById('payout-modal');
            modal.classList.remove('modal-active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        // 4. Логика заданий
        async function doTask(amt) {
            tg.HapticFeedback.impactOccurred('light');
            const userId = tg.initDataUnsafe.user?.id || 12345;
            
            try {
                const res = await fetch(`${API_URL}/complete_task`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId})
                });
                const data = await res.json();
                if (data.status === 'success') {
                    document.getElementById('balance').innerText = data.new_balance.toFixed(2);
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } catch (e) {
                tg.showPopup({message: "Ошибка сервера"});
            }
        }
    </script>
</body>
</html>
