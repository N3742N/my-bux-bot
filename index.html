<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS Liquid Bux</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-glass: rgba(28, 28, 30, 0.9);
            --ios-text: #ffffff;
            --ios-accent: #0A84FF;
            --ios-success: #32D74B;
            --ios-dark-card: #1c1c1e;
            --ios-modal-bg: #f2f2f7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--ios-bg);
            background-image: radial-gradient(circle at 50% -20%, #1c2c4c 0%, #000000 100%);
            color: var(--ios-text);
            margin: 0; padding: 20px 16px 110px 16px;
            display: flex; flex-direction: column; gap: 18px;
            -webkit-user-select: none;
        }

        .liquid-card {
            background: var(--ios-glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 16px;
        }

        .task-info { display: flex; align-items: center; gap: 12px; }
        .task-icon { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; }
        .task-text { font-size: 15px; font-weight: 500; }
        .task-counter { font-size: 12px; color: #8e8e93; margin-top: 2px; }

        .btn-blue {
            width: 100%; background: var(--ios-accent); color: #fff;
            border: none; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 600;
        }

        /* Выделенная 5-я кнопка */
        .btn-premium {
            width: 100%; background: linear-gradient(135deg, #0A84FF 0%, #5AC8FA 100%);
            color: #fff; border: none; padding: 16px; border-radius: 14px;
            font-size: 16px; font-weight: 700; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3);
        }

        .section-label { font-size: 13px; color: #8e8e93; text-transform: uppercase; margin-left: 10px; }

        .fixed-bottom { position: fixed; bottom: 20px; left: 16px; right: 16px; z-index: 100; }
        .btn-withdraw {
            width: 100%; background: #1c1c1e; color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 16px; border-radius: 18px; font-size: 17px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .payout-item { background: var(--ios-dark-card); border-radius: 18px; padding: 12px; text-align: center; transition: opacity 0.5s; }
        .payout-amount { color: var(--ios-success); font-weight: 800; }
    </style>
</head>
<body>

    <div class="liquid-card" style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="" id="user-avatar" style="width:44px; height:44px; border-radius:50%; border:2px solid var(--ios-accent)">
            <div id="user-name" style="font-weight:700">Загрузка...</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 11px; opacity: 0.5;">БАЛАНС</div>
            <div style="font-size: 22px; font-weight: 800;"><span id="balance">0.00</span> ₴</div>
        </div>
    </div>

    <div class="section-label">Последние выплаты</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div class="payout-item" id="p-card-1">
            <div style="font-size: 11px; color: #8e8e93;" class="payout-time">--:--</div>
            <div class="payout-amount">0 ₴</div>
            <div style="font-size: 10px; color: #8e8e93;" class="payout-user">...</div>
        </div>
        <div class="payout-item" id="p-card-2">
            <div style="font-size: 11px; color: #8e8e93;" class="payout-time">--:--</div>
            <div class="payout-amount">0 ₴</div>
            <div style="font-size: 10px; color: #8e8e93;" class="payout-user">...</div>
        </div>
    </div>

    <div class="section-label">Доступные задания</div>
    
    <div class="liquid-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div class="task-info"><img src="like_button.png" class="task-icon"><span class="task-text">Лайк на пост</span></div>
            <span style="color: var(--ios-success); font-weight: 700;">+0.50 ₴</span>
        </div>
        <button class="btn-blue" onclick="takeTask(0.50)">Выполнить</button>
    </div>

    <div class="liquid-card" style="border: 1px solid rgba(10, 132, 255, 0.3);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div class="task-info">
                <img src="invite_friends_links.png" class="task-icon">
                <div>
                    <div class="task-text" style="font-weight: 700;">Пригласить 10 друзей</div>
                    <div class="task-counter">Выполнено: 0 из 10</div>
                </div>
            </div>
            <span style="color: var(--ios-success); font-weight: 800;">+50.00 ₴</span>
        </div>
        <button class="btn-premium" onclick="tg.openTelegramLink('https://t.me/share/url?url=t.me/your_bot')">Пригласить 10 друзей</button>
    </div>

    <div class="fixed-bottom">
        <button class="btn-withdraw" onclick="tg.showAlert('Вывод от 100 ₴')"><span>💳</span> Вывод денег</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = "https://ТВОЙ-NGROK.ngrok-free.dev"; 
        tg.expand();

        async function loadData() {
            const userId = tg.initDataUnsafe.user?.id || 0;
            try {
                const res = await fetch(`${API_URL}/get_balance`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId})
                });
                const data = await res.json();
                document.getElementById('balance').innerText = data.balance.toFixed(2);
            } catch (e) { console.log("Offline mode"); }
        }

        async function takeTask(reward) {
            tg.HapticFeedback.impactOccurred('medium');
            const userId = tg.initDataUnsafe.user?.id || 0;
            const res = await fetch(`${API_URL}/complete_task`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, amount: reward})
            });
            const data = await res.json();
            document.getElementById('balance').innerText = data.new_balance.toFixed(2);
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Рандомные выплаты (Live)
        function updatePayout(id) {
            const card = document.getElementById(id);
            const amount = (Math.random() * 5000 + 500).toFixed(0);
            card.style.opacity = 0;
            setTimeout(() => {
                card.querySelector('.payout-amount').innerText = amount + " ₴";
                card.style.opacity = 1;
            }, 500);
            setTimeout(() => updatePayout(id), Math.random() * 14000 + 1000);
        }

        if (tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-avatar').src = tg.initDataUnsafe.user.photo_url || "https://ui-avatars.com/api/?name=User";
        }
        
        loadData();
        updatePayout('p-card-1');
        setTimeout(() => updatePayout('p-card-2'), 5000);
    </script>
</body>
</html>
